<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>皮探隊 — 8735 串流測試</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", "PingFang TC", sans-serif;
    background: #0f172a;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(74, 222, 128, 0.15), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(168, 85, 247, 0.15), transparent 50%);
    color: #e2e8f0;
    min-height: 100vh;
    padding: 20px 16px 40px;
    -webkit-user-select: none;
    user-select: none;
  }

  .container {
    max-width: 540px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 24px;
  }

  .logo { font-size: 36px; margin-bottom: 4px; }
  h1 {
    font-size: 22px;
    color: #4ade80;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  .subtitle { color: #64748b; font-size: 13px; }

  .setup-panel {
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(148, 163, 184, 0.1);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .setup-panel.hidden { display: none; }

  .label {
    font-size: 12px;
    color: #94a3b8;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .input-row { display: flex; gap: 8px; }

  input {
    flex: 1;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 12px 14px;
    color: #e2e8f0;
    font-size: 16px;
    font-family: 'SF Mono', Menlo, monospace;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #4ade80; }

  button {
    background: #4ade80;
    color: #0f172a;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  button:hover { background: #22c55e; }
  button:active { transform: scale(0.96); }
  button.secondary { background: #334155; color: #e2e8f0; }
  button.secondary:hover { background: #475569; }

  .hint {
    font-size: 12px;
    color: #64748b;
    margin-top: 8px;
    line-height: 1.5;
  }

  .video-frame {
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    aspect-ratio: 16 / 9;
    position: relative;
    margin-bottom: 16px;
  }

  .video-frame img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #475569;
    font-size: 14px;
    gap: 12px;
    text-align: center;
    padding: 20px;
  }

  .placeholder svg { width: 48px; height: 48px; opacity: 0.4; }

  .status-pill {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(10px);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 2;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ef4444;
  }

  .status-pill.live .dot {
    background: #4ade80;
    box-shadow: 0 0 8px #4ade80;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .res-tag {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(10px);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    color: #94a3b8;
    font-family: 'SF Mono', monospace;
    z-index: 2;
  }

  .info-card {
    background: rgba(30, 41, 59, 0.5);
    border: 1px solid rgba(148, 163, 184, 0.1);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
    font-size: 13px;
    line-height: 1.6;
  }

  .info-card .row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
  }

  .info-card .key { color: #94a3b8; }
  .info-card .val { color: #e2e8f0; font-family: 'SF Mono', monospace; }
  .info-card .val.ok { color: #4ade80; }
  .info-card .val.err { color: #ef4444; }

  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  footer {
    text-align: center;
    margin-top: 32px;
    color: #475569;
    font-size: 11px;
    line-height: 1.6;
  }

  code {
    background: rgba(74, 222, 128, 0.15);
    color: #4ade80;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'SF Mono', monospace;
    font-size: 11px;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">🌱</div>
    <h1>皮 探 隊</h1>
    <div class="subtitle">PikSeek · 8735 Ultra 串流測試</div>
  </header>

  <div class="setup-panel" id="setupPanel">
    <div class="label">8735 IP 位址</div>
    <div class="input-row">
      <input type="text" id="ipInput" placeholder="192.168.1.108">
      <button onclick="connect()">連接</button>
    </div>
    <div class="hint">
      💡 開 Arduino Serial Monitor (115200) 看到 <code>IP address: 192.168.x.x</code> 那行,把 IP 填進來
    </div>
  </div>

  <div class="video-frame">
    <div class="status-pill" id="statusPill">
      <span class="dot"></span>
      <span id="statusText">未連線</span>
    </div>
    <div class="res-tag" id="resTag" style="display:none">1024×576</div>

    <div class="placeholder" id="placeholder">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M9 2v2H4v15h16V4h-5V2h7v19H2V2h7zm6 0v2h-2V2h2zm-2 4h4v2h-4V6zm-3 8a3 3 0 100-6 3 3 0 000 6zm0-2a1 1 0 110-2 1 1 0 010 2z"/>
      </svg>
      請輸入 8735 的 IP 並按「連接」
    </div>

    <img id="streamImg" style="display: none;" alt="影像串流">
  </div>

  <div class="info-card">
    <div class="row">
      <span class="key">📡 串流網址</span>
      <span class="val" id="streamUrl">-</span>
    </div>
    <div class="row">
      <span class="key">🔌 連線狀態</span>
      <span class="val" id="connStatus">-</span>
    </div>
    <div class="row">
      <span class="key">⏱ 已運行</span>
      <span class="val" id="uptime">0s</span>
    </div>
    <div class="row">
      <span class="key">🔄 重連次數</span>
      <span class="val" id="reconnects">0</span>
    </div>
  </div>

  <div class="controls">
    <button onclick="reload()">🔄 重新整理</button>
    <button class="secondary" onclick="changeIp()">⚙ 換 IP</button>
  </div>

  <footer>
    PikSeek Demo · MJPEG over HTTP<br>
    串流自 <code>http://&lt;8735-IP&gt;/</code>(port 80)
  </footer>

</div>

<script>
let currentIp = '';
let startTime = null;
let reconnectCount = 0;
let uptimeTimer = null;

function connect() {
  const ip = document.getElementById('ipInput').value.trim();
  if (!ip) {
    alert('請輸入 8735 的 IP');
    return;
  }

  currentIp = ip;
  startTime = Date.now();
  reconnectCount = 0;

  try { localStorage.setItem('pikseek_last_ip', ip); } catch(e) {}

  document.getElementById('setupPanel').classList.add('hidden');
  startStream();

  if (uptimeTimer) clearInterval(uptimeTimer);
  uptimeTimer = setInterval(updateUptime, 1000);
}

function startStream() {
  const img = document.getElementById('streamImg');
  const placeholder = document.getElementById('placeholder');
  const statusPill = document.getElementById('statusPill');
  const statusText = document.getElementById('statusText');
  const resTag = document.getElementById('resTag');

  // 8735 範例用 port 80,任何路徑都觸發串流
  const streamUrl = `http://${currentIp}/`;

  document.getElementById('streamUrl').textContent = streamUrl;

  img.src = '';
  setTimeout(() => {
    img.src = streamUrl;
  }, 100);

  img.onload = () => {
    placeholder.style.display = 'none';
    img.style.display = 'block';
    resTag.style.display = 'block';
    statusPill.classList.add('live');
    statusText.textContent = 'LIVE';
    document.getElementById('connStatus').innerHTML =
      '<span class="val ok">已連線</span>';
  };

  img.onerror = () => {
    placeholder.style.display = 'flex';
    img.style.display = 'none';
    resTag.style.display = 'none';
    statusPill.classList.remove('live');
    statusText.textContent = '連線失敗';
    document.getElementById('connStatus').innerHTML =
      '<span class="val err">無法連線</span>';

    reconnectCount++;
    document.getElementById('reconnects').textContent = reconnectCount;
    setTimeout(startStream, 3000);
  };
}

function reload() {
  if (!currentIp) {
    alert('請先連接 8735');
    return;
  }
  startStream();
}

function changeIp() {
  document.getElementById('setupPanel').classList.remove('hidden');
  if (uptimeTimer) {
    clearInterval(uptimeTimer);
    uptimeTimer = null;
  }
}

function updateUptime() {
  if (!startTime) return;
  const sec = Math.floor((Date.now() - startTime) / 1000);
  const min = Math.floor(sec / 60);
  const hour = Math.floor(min / 60);
  const remainMin = min % 60;
  const remainSec = sec % 60;

  let text;
  if (hour > 0) text = `${hour}h ${remainMin}m ${remainSec}s`;
  else if (min > 0) text = `${min}m ${remainSec}s`;
  else text = `${sec}s`;

  document.getElementById('uptime').textContent = text;
}

window.addEventListener('load', () => {
  try {
    const lastIp = localStorage.getItem('pikseek_last_ip');
    if (lastIp) {
      document.getElementById('ipInput').value = lastIp;
    }
  } catch(e) {}
});
</script>
</body>
</html>
